name: TAFE NSW Course Search Load Test

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  load-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup k6 with browser
        uses: grafana/setup-k6-action@v1
        with:
          browser: true

      - name: Run load test for TAFE NSW Course Search
        run: k6 run tests/course-search-load-test.js
        env:
          K6_BROWSER_ENABLED: 'true'

      - name: Prepare report for deployment
        if: always()
        run: mkdir -p gh-pages-dist && cp index.html gh-pages-dist/

      - name: Deploy report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages-dist
